<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clean Tracker</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    .app {
      width: min(1000px, 95vw);
      display: grid;
      gap: 12px;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    button, select {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #eee;
    }

    .status {
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 700;
      border: 1px solid #333;
      background: #1a1a1a;
    }

    .status.locked { color: #56f056; }
    .status.weak { color: #ffcc33; }
    .status.lost { color: #ff6666; }
    .status.idle { color: #aaa; }

    .stage {
      position: relative;
      display: inline-block;
      max-width: 100%;
      border: 1px solid #333;
      border-radius: 10px;
      overflow: hidden;
      background: #000;
      cursor: grab;
    }

    .stage.panning { cursor: grabbing; }
    .stage.lock-armed { cursor: crosshair; }

    .world {
      position: relative;
      transform-origin: top left;
      will-change: transform;
    }

    video {
      display: block;
      max-width: none;
      height: auto;
    }

    .dot {
      position: absolute;
      width: 14px;
      height: 14px;
      margin-left: -7px;
      margin-top: -7px;
      border-radius: 999px;
      background: #56f056;
      border: 2px solid #fff;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.6);
      pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="controls">
      <button id="captureBtn" type="button">Capture Screen</button>
      <select id="driverSelect">
        <option value="">Select driver</option>
      </select>
      <button id="relockBtn" type="button">Relock Next Click</button>
      <div id="status" class="status idle">idle</div>
    </div>

    <div class="stage" id="stage">
      <div id="world" class="world">
        <video id="video" autoplay playsinline muted></video>
        <div id="dot" class="dot"></div>
      </div>
    </div>

    <canvas id="frameCanvas" style="display:none;"></canvas>
  </div>

  <script>
    const captureBtn = document.getElementById("captureBtn");
    const driverSelect = document.getElementById("driverSelect");
    const relockBtn = document.getElementById("relockBtn");
    const statusEl = document.getElementById("status");
    const stage = document.getElementById("stage");
    const world = document.getElementById("world");
    const video = document.getElementById("video");
    const dot = document.getElementById("dot");
    const frameCanvas = document.getElementById("frameCanvas");

    let stream = null;
    let updating = false;
    let updateTimer = null;
    let hasLock = false;
    let lockArmed = false;
    let dotX = null;
    let dotY = null;
    let zoom = 1;
    let panX = 0;
    let panY = 0;
    let isPanning = false;
    let panMoved = false;
    let panStartX = 0;
    let panStartY = 0;
    let startPanX = 0;
    let startPanY = 0;

    function setStatus(value, x = null, y = null) {
      const v = (value || "idle").toLowerCase();
      const xy = Number.isFinite(x) && Number.isFinite(y)
        ? ` • x:${Math.round(x)} y:${Math.round(y)}`
        : "";
      statusEl.textContent = `${v}${xy}`;
      statusEl.className = `status ${["locked", "weak", "lost"].includes(v) ? v : "idle"}`;
      applyDotStyle(v);
    }

    function applyDotStyle(status) {
      if (dotX === null || dotY === null) return;
      const s = (status || "").toLowerCase();
      if (s === "weak") dot.style.background = "#ffcc33";
      else if (s === "lost") dot.style.background = "#ff6666";
      else dot.style.background = "#56f056";
    }

    function applyWorldTransform() {
      world.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
      stage.classList.toggle("lock-armed", lockArmed);
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    async function loadDrivers() {
      try {
        const res = await fetch("/api/race", { cache: "no-store" });
        const data = await res.json();
        const drivers = Array.isArray(data.drivers) ? data.drivers : [];

        for (const d of drivers) {
          const opt = document.createElement("option");
          opt.value = String(d.id);
          opt.textContent = `#${d.id} ${d.name}`;
          driverSelect.appendChild(opt);
        }
      } catch (_) {
        // fallback if /api/race unavailable
        const fallback = [
          { id: 1, name: "Driver 1" },
          { id: 2, name: "Driver 2" },
          { id: 3, name: "Driver 3" }
        ];
        for (const d of fallback) {
          const opt = document.createElement("option");
          opt.value = String(d.id);
          opt.textContent = `#${d.id} ${d.name}`;
          driverSelect.appendChild(opt);
        }
      }
    }

    function currentFrameJpeg(quality = 0.88) {
      frameCanvas.width = video.videoWidth;
      frameCanvas.height = video.videoHeight;
      const ctx = frameCanvas.getContext("2d");
      ctx.drawImage(video, 0, 0, frameCanvas.width, frameCanvas.height);
      return frameCanvas.toDataURL("image/jpeg", quality);
    }

    function clientToVideoPixels(clientX, clientY) {
      const rect = world.getBoundingClientRect();
      const localX = (clientX - rect.left) / zoom;
      const localY = (clientY - rect.top) / zoom;
      const xNorm = localX / video.videoWidth;
      const yNorm = localY / video.videoHeight;
      return {
        x: Math.max(0, Math.min(video.videoWidth, xNorm * video.videoWidth)),
        y: Math.max(0, Math.min(video.videoHeight, yNorm * video.videoHeight))
      };
    }

    function renderDot(x, y, status = null) {
      dotX = x;
      dotY = y;
      dot.style.left = `${x}px`;
      dot.style.top = `${y}px`;
      dot.style.display = "block";
      if (status) applyDotStyle(status);
    }

    async function lockAtPoint(driverId, x, y) {
      const frame_data_url = currentFrameJpeg(0.88);

      const res = await fetch("/api/cv/init", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          driver_id: Number(driverId),
          x,
          y,
          frame_data_url,
          patch_w: 44,
          patch_h: 44,
          search_radius: 240
        })
      });

      const data = await res.json();
      if (!data.ok) throw new Error("Lock failed");
      hasLock = true;
      setStatus("locked", x, y);
      renderDot(x, y, "locked");
    }

    async function updateTracks() {
      if (!hasLock || !video.videoWidth || !video.videoHeight || updating) return;
      updating = true;

      try {
        const frame_data_url = currentFrameJpeg(0.88);
        const res = await fetch("/api/cv/update", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ frame_data_url })
        });

        const data = await res.json();
        if (!data.ok || !Array.isArray(data.results) || data.results.length === 0) return;

        const selectedId = Number(driverSelect.value);
        const hit = data.results.find(r => Number(r.driver_id) === selectedId) || data.results[0];

        if (typeof hit.x === "number" && typeof hit.y === "number") {
          renderDot(hit.x, hit.y, hit.status || "locked");
          setStatus(hit.status || "locked", hit.x, hit.y);
        } else {
          setStatus(hit.status || "locked", dotX, dotY);
        }
      } catch (_) {
        setStatus("lost", dotX, dotY);
      } finally {
        updating = false;
      }
    }

    function startUpdateLoop() {
      if (updateTimer) clearInterval(updateTimer);
      updateTimer = setInterval(updateTracks, 80);
    }

    function armLockMode() {
      if (!driverSelect.value) return;
      lockArmed = true;
      applyWorldTransform();
    }

    function disarmLockMode() {
      lockArmed = false;
      applyWorldTransform();
    }

    captureBtn.addEventListener("click", async () => {
      try {
        if (stream) stream.getTracks().forEach(t => t.stop());

        stream = await navigator.mediaDevices.getDisplayMedia({
          video: { frameRate: { ideal: 30, max: 60 } },
          audio: false
        });

        video.srcObject = stream;
        stream.getVideoTracks()[0].addEventListener("ended", () => {
          hasLock = false;
          dotX = null;
          dotY = null;
          dot.style.display = "none";
          setStatus("idle");
          disarmLockMode();
          if (updateTimer) clearInterval(updateTimer);
        });

        await video.play();
        video.style.width = `${video.videoWidth}px`;
        video.style.height = `${video.videoHeight}px`;
        world.style.width = `${video.videoWidth}px`;
        world.style.height = `${video.videoHeight}px`;
        zoom = 1;
        panX = 0;
        panY = 0;
        applyWorldTransform();
        startUpdateLoop();
      } catch (_) {
        setStatus("idle");
      }
    });

    driverSelect.addEventListener("change", () => {
      if (driverSelect.value) armLockMode();
      else disarmLockMode();
    });

    relockBtn.addEventListener("click", () => armLockMode());

    stage.addEventListener("wheel", (event) => {
      if (!video.videoWidth || !video.videoHeight) return;
      event.preventDefault();

      const oldZoom = zoom;
      const newZoom = clamp(zoom * (event.deltaY < 0 ? 1.1 : 0.9), 1, 4);
      if (newZoom === oldZoom) return;

      const rect = stage.getBoundingClientRect();
      const px = event.clientX - rect.left;
      const py = event.clientY - rect.top;
      const worldX = (px - panX) / oldZoom;
      const worldY = (py - panY) / oldZoom;

      zoom = newZoom;
      panX = px - worldX * zoom;
      panY = py - worldY * zoom;
      applyWorldTransform();
    }, { passive: false });

    stage.addEventListener("mousedown", (event) => {
      if (zoom <= 1 || lockArmed) return;
      isPanning = true;
      panMoved = false;
      stage.classList.add("panning");
      panStartX = event.clientX;
      panStartY = event.clientY;
      startPanX = panX;
      startPanY = panY;
    });

    window.addEventListener("mousemove", (event) => {
      if (!isPanning) return;
      const dx = event.clientX - panStartX;
      const dy = event.clientY - panStartY;
      if (Math.abs(dx) > 2 || Math.abs(dy) > 2) panMoved = true;
      panX = startPanX + dx;
      panY = startPanY + dy;
      applyWorldTransform();
    });

    window.addEventListener("mouseup", () => {
      if (!isPanning) return;
      isPanning = false;
      stage.classList.remove("panning");
    });

    stage.addEventListener("click", async (event) => {
      if (!video.videoWidth || !video.videoHeight) return;
      if (!driverSelect.value || !lockArmed) return;
      if (panMoved) return;

      const p = clientToVideoPixels(event.clientX, event.clientY);
      renderDot(p.x, p.y, "weak");
      setStatus("weak", p.x, p.y);
      disarmLockMode();

      try {
        await lockAtPoint(driverSelect.value, p.x, p.y);
      } catch (_) {
        hasLock = false;
        setStatus("lost", p.x, p.y);
        renderDot(p.x, p.y, "lost");
      }
    });

    loadDrivers();
  </script>
</body>
</html>

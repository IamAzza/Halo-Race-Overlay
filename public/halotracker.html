<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clean Tracker</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    .app {
      width: min(1000px, 95vw);
      display: grid;
      gap: 12px;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    button, select {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #eee;
    }

    .status {
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 700;
      border: 1px solid #333;
      background: #1a1a1a;
    }

    .status.locked { color: #56f056; }
    .status.weak { color: #ffcc33; }
    .status.lost { color: #ff6666; }
    .status.locking { color: #66b3ff; }
    .status.idle { color: #aaa; }

    .stage {
      position: relative;
      display: inline-block;
      max-width: 100%;
      border: 1px solid #333;
      border-radius: 10px;
      overflow: hidden;
      background: #000;
      cursor: grab;
    }

    .stage.panning { cursor: grabbing; }
    .stage.lock-armed { cursor: crosshair; }

    .world {
      position: relative;
      transform-origin: top left;
      will-change: transform;
    }

    video {
      display: block;
      max-width: none;
      height: auto;
    }

    .dot {
      position: absolute;
      width: 14px;
      height: 14px;
      margin-left: -7px;
      margin-top: -7px;
      border-radius: 999px;
      background: #56f056;
      border: 2px solid #fff;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.6);
      pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="controls">
      <button id="captureBtn" type="button">Capture Screen</button>
      <select id="driverSelect">
        <option value="">Select driver</option>
      </select>
      <button id="relockBtn" type="button">Lock Selected Driver</button>
      <label for="dotSizeInput">Dot Size</label>
      <input id="dotSizeInput" type="range" min="8" max="30" step="1" value="14" />
      <div id="status" class="status idle">idle</div>
    </div>

    <div class="stage" id="stage">
      <div id="world" class="world">
        <video id="video" autoplay playsinline muted></video>
      </div>
    </div>

    <canvas id="frameCanvas" style="display:none;"></canvas>
  </div>

  <script>
    const captureBtn = document.getElementById("captureBtn");
    const driverSelect = document.getElementById("driverSelect");
    const relockBtn = document.getElementById("relockBtn");
    const dotSizeInput = document.getElementById("dotSizeInput");
    const statusEl = document.getElementById("status");
    const stage = document.getElementById("stage");
    const world = document.getElementById("world");
    const video = document.getElementById("video");
    const frameCanvas = document.getElementById("frameCanvas");

    let stream = null;
    let updating = false;
    let updateTimer = null;
    const driverMeta = new Map();
    const tracks = new Map();
    let lockArmed = false;
    let selectedDriverId = null;
    let dotSize = 14;
    let zoom = 1;
    let panX = 0;
    let panY = 0;
    let isPanning = false;
    let panMoved = false;
    let panStartX = 0;
    let panStartY = 0;
    let startPanX = 0;
    let startPanY = 0;

    function updateStatusDisplay() {
      const track = selectedDriverId ? tracks.get(selectedDriverId) : null;
      if (!track) {
        statusEl.textContent = lockArmed ? "ready to lock" : "idle";
        statusEl.className = "status idle";
        return;
      }
      const xy = Number.isFinite(track.x) && Number.isFinite(track.y)
        ? ` • x:${Math.round(track.x)} y:${Math.round(track.y)}`
        : "";
      statusEl.textContent = `${track.status}${xy}`;
      statusEl.className = `status ${["locking", "locked", "weak", "lost"].includes(track.status) ? track.status : "idle"}`;
    }

    function applyDotStyle(track) {
      if (!track) return;
      if (track.status === "locking") track.dot.style.background = "#66b3ff";
      else if (track.status === "weak") track.dot.style.background = "#ffcc33";
      else if (track.status === "lost") track.dot.style.background = "#ff6666";
      else track.dot.style.background = track.baseColor || "#56f056";
    }

    function applyDotSize(track) {
      const half = Math.round(dotSize / 2);
      track.dot.style.width = `${dotSize}px`;
      track.dot.style.height = `${dotSize}px`;
      track.dot.style.marginLeft = `-${half}px`;
      track.dot.style.marginTop = `-${half}px`;
    }

    function getOrCreateTrack(driverId) {
      if (tracks.has(driverId)) return tracks.get(driverId);
      const meta = driverMeta.get(driverId) || {};
      const track = {
        driverId,
        x: null,
        y: null,
        status: "locking",
        baseColor: meta.color || "#56f056",
        dot: document.createElement("div")
      };
      track.dot.className = "dot";
      applyDotSize(track);
      applyDotStyle(track);
      world.appendChild(track.dot);
      tracks.set(driverId, track);
      return track;
    }

    function setTrackState(driverId, x, y, status) {
      const track = getOrCreateTrack(driverId);
      track.x = x;
      track.y = y;
      track.status = status;
      track.dot.style.left = `${x}px`;
      track.dot.style.top = `${y}px`;
      track.dot.style.display = "block";
      applyDotStyle(track);
      if (selectedDriverId === driverId) updateStatusDisplay();
    }

    function applyWorldTransform() {
      world.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
      stage.classList.toggle("lock-armed", lockArmed);
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    async function loadDrivers() {
      try {
        const res = await fetch("/api/race", { cache: "no-store" });
        const data = await res.json();
        const drivers = Array.isArray(data.drivers) ? data.drivers : [];

        for (const d of drivers) {
          driverMeta.set(Number(d.id), { color: d.primaryColor || "#56f056" });
          const opt = document.createElement("option");
          opt.value = String(d.id);
          opt.textContent = `#${d.id} ${d.name}`;
          driverSelect.appendChild(opt);
        }
      } catch (_) {
        // fallback if /api/race unavailable
        const fallback = [
          { id: 1, name: "Driver 1" },
          { id: 2, name: "Driver 2" },
          { id: 3, name: "Driver 3" }
        ];
        for (const d of fallback) {
          driverMeta.set(Number(d.id), { color: "#56f056" });
          const opt = document.createElement("option");
          opt.value = String(d.id);
          opt.textContent = `#${d.id} ${d.name}`;
          driverSelect.appendChild(opt);
        }
      }
    }

    function currentFrameJpeg(quality = 0.88) {
      frameCanvas.width = video.videoWidth;
      frameCanvas.height = video.videoHeight;
      const ctx = frameCanvas.getContext("2d");
      ctx.drawImage(video, 0, 0, frameCanvas.width, frameCanvas.height);
      return frameCanvas.toDataURL("image/jpeg", quality);
    }

    function clientToVideoPixels(clientX, clientY) {
      const rect = world.getBoundingClientRect();
      const localX = (clientX - rect.left) / zoom;
      const localY = (clientY - rect.top) / zoom;
      const xNorm = localX / video.videoWidth;
      const yNorm = localY / video.videoHeight;
      return {
        x: Math.max(0, Math.min(video.videoWidth, xNorm * video.videoWidth)),
        y: Math.max(0, Math.min(video.videoHeight, yNorm * video.videoHeight))
      };
    }

    async function lockAtPoint(driverId, x, y) {
      const frame_data_url = currentFrameJpeg(0.88);

      const res = await fetch("/api/cv/init", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          driver_id: Number(driverId),
          x,
          y,
          frame_data_url,
          patch_w: 44,
          patch_h: 44,
          search_radius: 240
        })
      });

      const data = await res.json();
      if (!data.ok) throw new Error("Lock failed");
      setTrackState(driverId, x, y, (data.status || "locked").toLowerCase());
    }

    async function updateTracks() {
      if (!video.videoWidth || !video.videoHeight || updating || tracks.size === 0) return;
      updating = true;

      try {
        const frame_data_url = currentFrameJpeg(0.88);
        const res = await fetch("/api/cv/update", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ frame_data_url })
        });

        const data = await res.json();
        if (!data.ok || !Array.isArray(data.results) || data.results.length === 0) return;
        for (const hit of data.results) {
          const driverId = Number(hit.driver_id);
          if (!Number.isFinite(driverId) || !tracks.has(driverId)) continue;
          const track = tracks.get(driverId);
          const status = (hit.status || track.status || "locked").toLowerCase();
          const x = Number.isFinite(Number(hit.x)) ? Number(hit.x) : track.x;
          const y = Number.isFinite(Number(hit.y)) ? Number(hit.y) : track.y;
          if (Number.isFinite(x) && Number.isFinite(y)) {
            setTrackState(driverId, x, y, status);
          } else {
            track.status = status;
            if (selectedDriverId === driverId) updateStatusDisplay();
          }
        }
      } catch (_) {
        // keep prior statuses on transient update failures
      } finally {
        updating = false;
      }
    }

    function startUpdateLoop() {
      if (updateTimer) clearInterval(updateTimer);
      updateTimer = setInterval(updateTracks, 80);
    }

    function armLockMode() {
      if (!selectedDriverId) return;
      lockArmed = true;
      applyWorldTransform();
      updateStatusDisplay();
    }

    function disarmLockMode() {
      lockArmed = false;
      applyWorldTransform();
      updateStatusDisplay();
    }

    captureBtn.addEventListener("click", async () => {
      try {
        if (stream) stream.getTracks().forEach(t => t.stop());

        stream = await navigator.mediaDevices.getDisplayMedia({
          video: { frameRate: { ideal: 30, max: 60 } },
          audio: false
        });

        video.srcObject = stream;
        stream.getVideoTracks()[0].addEventListener("ended", () => {
          tracks.forEach((track) => track.dot.remove());
          tracks.clear();
          selectedDriverId = null;
          driverSelect.value = "";
          disarmLockMode();
          updateStatusDisplay();
          if (updateTimer) clearInterval(updateTimer);
        });

        await video.play();
        video.style.width = `${video.videoWidth}px`;
        video.style.height = `${video.videoHeight}px`;
        world.style.width = `${video.videoWidth}px`;
        world.style.height = `${video.videoHeight}px`;
        zoom = 1;
        panX = 0;
        panY = 0;
        applyWorldTransform();
        startUpdateLoop();
      } catch (_) {
        updateStatusDisplay();
      }
    });

    driverSelect.addEventListener("change", () => {
      selectedDriverId = driverSelect.value ? Number(driverSelect.value) : null;
      disarmLockMode();
      updateStatusDisplay();
    });

    relockBtn.addEventListener("click", () => armLockMode());
    dotSizeInput.addEventListener("input", () => {
      dotSize = Number(dotSizeInput.value);
      tracks.forEach((track) => applyDotSize(track));
    });

    stage.addEventListener("wheel", (event) => {
      if (!video.videoWidth || !video.videoHeight) return;
      event.preventDefault();

      const oldZoom = zoom;
      const newZoom = clamp(zoom * (event.deltaY < 0 ? 1.1 : 0.9), 1, 4);
      if (newZoom === oldZoom) return;

      const rect = stage.getBoundingClientRect();
      const px = event.clientX - rect.left;
      const py = event.clientY - rect.top;
      const worldX = (px - panX) / oldZoom;
      const worldY = (py - panY) / oldZoom;

      zoom = newZoom;
      panX = px - worldX * zoom;
      panY = py - worldY * zoom;
      applyWorldTransform();
    }, { passive: false });

    stage.addEventListener("mousedown", (event) => {
      if (zoom <= 1 || lockArmed) return;
      isPanning = true;
      panMoved = false;
      stage.classList.add("panning");
      panStartX = event.clientX;
      panStartY = event.clientY;
      startPanX = panX;
      startPanY = panY;
    });

    window.addEventListener("mousemove", (event) => {
      if (!isPanning) return;
      const dx = event.clientX - panStartX;
      const dy = event.clientY - panStartY;
      if (Math.abs(dx) > 2 || Math.abs(dy) > 2) panMoved = true;
      panX = startPanX + dx;
      panY = startPanY + dy;
      applyWorldTransform();
    });

    window.addEventListener("mouseup", () => {
      if (!isPanning) return;
      isPanning = false;
      stage.classList.remove("panning");
    });

    stage.addEventListener("click", async (event) => {
      if (!video.videoWidth || !video.videoHeight) return;
      if (!selectedDriverId || !lockArmed) return;
      if (panMoved) return;

      const p = clientToVideoPixels(event.clientX, event.clientY);
      setTrackState(selectedDriverId, p.x, p.y, "locking");
      disarmLockMode();

      try {
        await lockAtPoint(selectedDriverId, p.x, p.y);
      } catch (_) {
        setTrackState(selectedDriverId, p.x, p.y, "lost");
      }
    });

    loadDrivers();
  </script>
</body>
</html>

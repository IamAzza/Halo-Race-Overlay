<!-- public/overlay.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: transparent;
  font-family: Arial, sans-serif;
}

.board {
  width: 270px;
  background: rgba(0, 0, 0, 0.68);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border-left: 3px solid #52ff52;
  border-radius: 8px;
  overflow: visible;
  box-shadow: 0 8px 22px rgba(0,0,0,0.22);
  position: relative;
}

.header {
  padding: 6px 10px 5px;
  background: rgba(0, 0, 0, 0.95);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.logo-wrap {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 50px;
  overflow: hidden;
  margin-bottom: 2px;
}

.logo {
  width: 180px;
  height: 65px;
  object-fit: cover;
  object-position: center;
}

.track-name {
  font-family: 'Orbitron', sans-serif;
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.4px;
  color: #c8ff2f;
  margin-top: 0;
  margin-bottom: 2px;
  text-shadow: 0 0 6px rgba(200,255,47,0.4);
}

#rows {
  position: relative;
}

.row {
  display: grid;
  grid-template-columns: 5px 28px 1fr;
  align-items: center;
  gap: 10px;
  min-height: 30px;
  padding: 3px 8px;
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  will-change: transform, opacity;
  backface-visibility: hidden;
  transform: translateZ(0);
}

.row:nth-child(even) {
  background: rgba(255,255,255,0.035);
}

.podium-1 {
  background: rgba(255,215,0,0.04) !important;
  box-shadow: 0 0 12px rgba(255,215,0,0.18);
}
.podium-2 { background: rgba(192,192,192,0.03) !important; }
.podium-3 { background: rgba(205,127,50,0.03) !important; }

.bar {
  width: 3px;
  height: 15px;
  border-radius: 999px;
  box-shadow: 0 0 8px rgba(255,255,255,0.18);
}

.pos {
  font-size: 12px;
  font-weight: 900;
  color: white;
  font-family: 'Orbitron', sans-serif;
}

.p1 { color: #ffd700; }
.p2 { color: #c0c0c0; }
.p3 { color: #cd7f32; }

.name {
  font-size: 11.5px;
  font-weight: 800;
  color: rgba(255,255,255,0.95);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.driver-num {
  opacity: 0.72;
  margin-left: 6px;
  font-weight: 700;
}

.error {
  color: #ff6b6b;
  padding: 10px;
  font-size: 12px;
}

.moved-up {
  background: rgba(0,255,0,0.12) !important;
  box-shadow: inset 4px 0 0 #00ff66, 0 0 10px rgba(0,255,102,0.12);
}

.moved-down {
  background: rgba(255,0,0,0.12) !important;
  box-shadow: inset 4px 0 0 #ff4d4d, 0 0 10px rgba(255,77,77,0.12);
}

.overtake-popup {
  position: absolute;
  top: -44px;
  right: 0;
  min-width: 140px;
  max-width: 260px;
  padding: 8px 12px;
  border-radius: 8px;
  background: rgba(0, 0, 0, 0.88);
  border-left: 4px solid #52ff52;
  color: white;
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.5px;
  opacity: 0;
  transform: translateY(-8px);
  pointer-events: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  transition: opacity 220ms ease, transform 220ms ease;
  z-index: 50;
}

.overtake-popup.show {
  opacity: 1;
  transform: translateY(0);
}

.overtake-popup.up {
  border-left-color: #52ff52;
}

.overtake-popup.down {
  border-left-color: #ff4d4d;
}
</style>
</head>

<body>
<div class="board">
  <div class="header">
    <div class="logo-wrap">
      <img src="/nextlogo.png" class="logo" />
    </div>

    <div class="track-name" id="trackName">TRACK</div>
  </div>

  <div id="rows"></div>
  <div id="overtakePopup" class="overtake-popup"></div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const rows = document.getElementById("rows");
const trackNameEl = document.getElementById("trackName");
const overtakePopup = document.getElementById("overtakePopup");

const rowMap = new Map();
let previousPositions = new Map();
let popupTimeout = null;

function getRowClass(index) {
  let rowClass = "row";
  if (index === 0) rowClass += " podium-1";
  if (index === 1) rowClass += " podium-2";
  if (index === 2) rowClass += " podium-3";
  return rowClass;
}

function getPosClass(position) {
  let posClass = "pos";
  if (position === 1) posClass += " p1";
  if (position === 2) posClass += " p2";
  if (position === 3) posClass += " p3";
  return posClass;
}

function normalizeColor(value) {
  return typeof value === "string" && value.trim() ? value.trim() : "#52ff52";
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll('"', "&quot;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function showOvertakePopup(driverName, delta, duration = 1400) {
  if (!overtakePopup || !driverName || !delta) return;

  clearTimeout(popupTimeout);

  const isGain = delta > 0;
  const amount = Math.abs(delta);

  overtakePopup.classList.remove("up", "down", "show");
  overtakePopup.classList.add(isGain ? "up" : "down");

  overtakePopup.textContent = isGain
    ? `▲ ${driverName} +${amount}`
    : `▼ ${driverName} -${amount}`;

  requestAnimationFrame(() => {
    overtakePopup.classList.add("show");
  });

  popupTimeout = setTimeout(() => {
    overtakePopup.classList.remove("show");
  }, duration);
}

function createRow(driver, index) {
  const row = document.createElement("div");
  row.className = getRowClass(index);
  row.dataset.driverId = driver.name;
  row.style.transform = "translateY(0)";
  row.style.opacity = "1";

  const driverNumber = Number.isFinite(Number(driver.id)) ? `#${driver.id}` : "";

  row.innerHTML = `
    <div class="bar" style="background:${normalizeColor(driver.primaryColor)}"></div>
    <div class="${getPosClass(driver.position)}">${driver.position}</div>
    <div class="name">
      ${escapeHtml(driver.name)}
      ${driverNumber ? `<span class="driver-num">${escapeHtml(driverNumber)}</span>` : ""}
    </div>
  `;

  return row;
}

function updateRow(row, driver, index) {
  row.className = getRowClass(index);
  row.dataset.driverId = driver.name;

  let bar = row.querySelector(".bar");
  let pos = row.querySelector(".pos");
  let name = row.querySelector(".name");

  const driverNumber = Number.isFinite(Number(driver.id)) ? `#${driver.id}` : "";

  if (!bar || !pos || !name) {
    row.innerHTML = `
      <div class="bar" style="background:${normalizeColor(driver.primaryColor)}"></div>
      <div class="${getPosClass(driver.position)}">${driver.position}</div>
      <div class="name">
        ${escapeHtml(driver.name)}
        ${driverNumber ? `<span class="driver-num">${escapeHtml(driverNumber)}</span>` : ""}
      </div>
    `;
    return;
  }

  bar.style.background = normalizeColor(driver.primaryColor);
  pos.className = getPosClass(driver.position);
  pos.textContent = driver.position;
  name.innerHTML = `
    ${escapeHtml(driver.name)}
    ${driverNumber ? `<span class="driver-num">${escapeHtml(driverNumber)}</span>` : ""}
  `;
}

function animateReorder(sortedDrivers) {
  const oldRects = new Map();
  let biggestMove = null;

  Array.from(rows.children).forEach((child) => {
    oldRects.set(child.dataset.driverId, child.getBoundingClientRect());
  });

  const fragment = document.createDocumentFragment();

  sortedDrivers.forEach((driver, index) => {
    let row = rowMap.get(driver.name);

    if (!row) {
      row = createRow(driver, index);
      rowMap.set(driver.name, row);
    } else {
      updateRow(row, driver, index);
    }

    fragment.appendChild(row);
  });

  rows.replaceChildren(fragment);

  sortedDrivers.forEach((driver, index) => {
    const row = rowMap.get(driver.name);
    const oldRect = oldRects.get(driver.name);
    const newRect = row.getBoundingClientRect();

    row.classList.remove("moved-up", "moved-down");

    const oldPos = previousPositions.get(driver.name);
    const newPos = driver.position;

    if (typeof oldPos === "number" && oldPos !== newPos) {
      const delta = oldPos - newPos;

      if (delta > 0) {
        row.classList.add("moved-up");
        setTimeout(() => row.classList.remove("moved-up"), 700);
      } else {
        row.classList.add("moved-down");
        setTimeout(() => row.classList.remove("moved-down"), 700);
      }

      if (!biggestMove || Math.abs(delta) > Math.abs(biggestMove.delta)) {
        biggestMove = {
          name: driver.name,
          delta
        };
      }
    }

    if (oldRect) {
      const deltaY = oldRect.top - newRect.top;

      if (deltaY !== 0) {
        row.animate(
          [
            { transform: `translateY(${deltaY}px)` },
            { transform: "translateY(0)" }
          ],
          {
            duration: 650,
            delay: index * 20,
            easing: "cubic-bezier(0.22, 1, 0.36, 1)",
            fill: "both"
          }
        );
      }
    } else {
      row.animate(
        [
          { opacity: 0, transform: "translateY(-10px)" },
          { opacity: 1, transform: "translateY(0)" }
        ],
        {
          duration: 400,
          easing: "ease-out",
          fill: "both"
        }
      );
    }
  });

  if (biggestMove && Math.abs(biggestMove.delta) >= 2) {
    showOvertakePopup(biggestMove.name, biggestMove.delta);
  }

  previousPositions = new Map(sortedDrivers.map((d) => [d.name, d.position]));
}

function render(data) {
  if (!data || !Array.isArray(data.drivers)) {
    rows.innerHTML = '<div class="error">No data</div>';
    return;
  }

  trackNameEl.textContent = data.trackName || "TRACK";

  const sortedDrivers = data.drivers
    .slice()
    .sort((a, b) => a.position - b.position);

  animateReorder(sortedDrivers);
}

fetch("/api/race")
  .then((r) => r.json())
  .then(render)
  .catch(() => {
    rows.innerHTML = '<div class="error">Failed to load data</div>';
  });

const socket = io();
socket.on("raceUpdate", render);
</script>

</body>
</html>
